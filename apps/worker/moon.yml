# Tasks owned by the worker project (NestJS). Universal conventions (file
# groups, lint) are inherited from .moon/tasks/javascript.yml.
# Docs: https://moonrepo.dev/docs/config/project

language: 'typescript'
layer: 'application'

tasks:
  dev:
    command: 'nest start --watch'
    preset: 'server'

  build:
    command: 'nest build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
      - 'nest-cli.json'
    outputs:
      - 'dist'

  test:
    command: 'vitest run'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
      - 'vitest.config.ts'

  test-watch:
    command: 'vitest'
    preset: 'utility'

  test-cov:
    command: 'vitest run --coverage'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
      - 'vitest.config.ts'

  test-e2e:
    command: 'vitest run --config ./vitest.config.e2e.ts'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
      - 'vitest.config.e2e.ts'
