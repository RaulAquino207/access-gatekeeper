# Configures the toolchains (languages, package managers) that moon manages
# for the workspace. Docs: https://moonrepo.dev/docs/config/toolchain

proto:
  version: '0.58.2'

javascript:
  packageManager: 'pnpm'

node:
  version: '24.15.0'
  # Should keep .nvmrc in sync with the version above, but moon 2.4 does not
  # fire the sync yet — when bumping the version, update .nvmrc manually too.
  syncVersionManagerConfig: 'nvm'

pnpm:
  version: '11.10.0'
